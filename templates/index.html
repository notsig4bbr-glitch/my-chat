<!DOCTYPE html>
<html>
<head>
    <title>Videx - Чат</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            height: calc(100vh - 40px);
        }

        #chat {
            background: white;
            flex: 1;
            max-width: 500px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #users-panel {
            background: white;
            width: 200px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #users-panel h3 {
            margin-top: 0;
            color: #2196f3;
        }

        #user-list {
            list-style: none;
            padding: 0;
        }

        #user-list li {
            padding: 5px 0;
            font-size: 14px;
        }

        #clearBtn {
            position: absolute;
            top: 10px;
            left: -5px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #clearBtn:hover { background: #1976d2; }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            padding-left: 20px;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #2196f3;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 10px;
            }
            
            #users-panel {
                width: 100%;
                order: 2;
            }

                max-width: none;
                margin-bottom: 10px;
