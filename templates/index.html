<!DOCTYPE html>
<html>
<head>
    <title>Videx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        #chat {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
            background: #fafafa;
        }

        #messageRow {
            display: flex;
            gap: 8px;
        }

        #messageText {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        button {
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            background: #2196f3;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1976d2;
        }

        #clearBtn {
            margin-bottom: 10px;
            width: fit-content;
            font-size: 13px;
            padding: 8px 12px;
        }

        .msg {
            padding: 8px 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 10px;
            border: 1px solid #eaeaea;
            word-break: break-word;
        }

        @media (max-width: 480px) {
            #chat {
                height: 95vh;
                padding: 12px;
            }

            #messageRow {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="chat">
        <button id="clearBtn" onclick="clearHistory()">🗑️ Очистить историю</button>
        <div id="messages"></div>

        <div id="messageRow">
            <input id="messageText" type="text" placeholder="Сообщение..." autocomplete="off">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        const username = prompt("Как тебя зовут?") || "Guest";
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws/${encodeURIComponent(username)}`);

        const messages = document.getElementById("messages");
        const input = document.getElementById("messageText");

        ws.onmessage = (event) => {
            const div = document.createElement("div");
            div.className = "msg";
            div.textContent = event.data;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        };

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            if (ws.readyState !== WebSocket.OPEN) return;
            ws.send(text);
            input.value = "";
        }

        function clearHistory() {
            messages.innerHTML = "";
            if (ws.readyState === WebSocket.OPEN) {
                ws.send("/clear");
            }
        }

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
