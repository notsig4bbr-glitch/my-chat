<!DOCTYPE html>
<html>
<head>
    <title>VIDEX - главная страница</title>
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #chat {
            background: white;
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #2196f3;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="chat">
        <div id="messages"></div>
        <input type="text" id="messageText" autocomplete="off"/>
        <button onclick="sendMessage()">Отправить</button>
    </div>
     <script>
        const username = prompt("Как тебя зовут?");
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws/${username}`);
        
        ws.onmessage = function(event) {
            var messages = document.getElementById('messages');
            var message = document.createElement('div');
            message.textContent = event.data;
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
        };

        function sendMessage() {
            var input = document.getElementById("messageText");
            if (input.value.trim() !== "") { 
                ws.send(input.value);
                input.value = '';
            }
        }

        document.getElementById("messageText").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html></html>
