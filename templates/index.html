<!DOCTYPE html>
<html>
<head>
    <title>Videx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            gap: 16px;
        }

        #chat {
            flex: 1;
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
        }

        #users-panel {
            width: 220px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            padding: 16px;
            box-sizing: border-box;
        }

        #users-panel h3 {
            margin: 0 0 12px 0;
            color: #2196f3;
        }

        #user-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #user-list li {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            word-break: break-word;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
            background: #fafafa;
        }

        #messageRow {
            display: flex;
            gap: 8px;
        }

        #messageText {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        button {
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            background: #2196f3;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1976d2;
        }

        #clearBtn {
            margin-bottom: 10px;
            width: fit-content;
            font-size: 13px;
            padding: 8px 12px;
        }

        .msg {
            padding: 8px 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 10px;
            border: 1px solid #eaeaea;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: 95vh;
            }

            #users-panel {
                width: 100%;
                order: 2;
            }
        }

        @media (max-width: 480px) {
            #messageRow {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="chat">
            <button id="clearBtn" onclick="clearHistory()">🗑️ Очистить историю</button>
            <div id="messages"></div>

            <div id="messageRow">
                <input id="messageText" type="text" placeholder="Сообщение..." autocomplete="off">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>

        <div id="users-panel">
            <h3>👥 Онлайн (<span id="userCount">0</span>)</h3>
            <ul id="user-list"></ul>
        </div>
    </div>

    <script>
        const username = prompt("Как тебя зовут?") || "Guest";
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws/${encodeURIComponent(username)}`);

        const messages = document.getElementById("messages");
        const input = document.getElementById("messageText");

        ws.onmessage = (event) => {
            const data = event.data;

            if (data.startsWith("USERS:")) {
                updateUsersList(data.slice(6));
                return;
            }

            const div = document.createElement("div");
            div.className = "msg";
            div.textContent = data;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        };

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            if (ws.readyState !== WebSocket.OPEN) return;
            ws.send(text);
            input.value = "";
        }

        function clearHistory() {
            messages.innerHTML = "";
            if (ws.readyState === WebSocket.OPEN) {
                ws.send("/clear");
            }
        }

        function updateUsersList(usersString) {
            const users = usersString.split(",").filter(u => u.trim());
            const userList = document.getElementById("user-list");
            const userCount = document.getElementById("userCount");

            userList.innerHTML = "";
            users.forEach(user => {
                const li = document.createElement("li");
                li.textContent = user;
                userList.appendChild(li);
            });

            userCount.textContent = users.length;
        }

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
