<!DOCTYPE html>
<html>
<head>
    <title>Мой чат</title>
    <style>
        /* Мягкий «телеграмный» фон */
        body {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #chat {
            background: white;
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #clearBtn {
            position: absolute;
            top: 20px;
            left: -100px;  
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }  
        #clearBtn:hover {
            background: #1976d2;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            padding-left: 10px;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #2196f3;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="chat">
        <!-- Кнопка очистки истории -->
        <button id="clearBtn" onclick="clearHistory()">🗑️ Очистить</button>
        
        <div id="messages"></div>
        <input type="text" id="messageText" autocomplete="off"/>
        <button onclick="sendMessage()">Отправить</button>
    </div>
    <script>
        const username = prompt("Как тебя зовут?");
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws/${username}`);
        
        ws.onmessage = function(event) {
            var messages = document.getElementById('messages');
            var message = document.createElement('div');
            message.textContent = event.data;
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
        };

        function sendMessage() {
            var input = document.getElementById("messageText");
            if (input.value.trim() !== "") {
                ws.send(input.value);
                input.value = '';
            }
        }

        // Функция очистки истории
        function clearHistory() {
            var messages = document.getElementById('messages');
            messages.innerHTML = ''; // Очищаем на фронте
            ws.send('/clear'); // Отправляем команду серверу
        }

        // Enter для отправки
        document.getElementById("messageText").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
