<!DOCTYPE html>
<html>
<head>
    <title>videx</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Videx - главная страница</h1>
    <div id="messages"></div>
    <input type="text" id="message-input" placeholder="Сообщение..." />
    <button id="send-btn">Отправить</button>

    <script>
        const username = prompt("Как тебя зовут?") || "Гость";
// Добавляем проверку на протокол и четкий путь
        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";   
        const ws = new WebSocket(protocol + window.location.host + "/ws/" + username);

        ws.onopen = () => console.log("Соединение установлено!");
        ws.onclose = () => console.log("Соединение закрыто!");
        ws.onerror = (e) => console.error("Ошибка:", e);;

        ws.onmessage = function(event) {
            const messagesDiv = document.getElementById("messages");
            const msg = document.createElement("div");
            msg.textContent = event.data;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        };

        document.getElementById("send-btn").onclick = function() {
            const input = document.getElementById("message-input");
            if (input.value.trim()) {
                ws.send(input.value);
                input.value = "";
            }
        };
    </script>
</body>
</html>
